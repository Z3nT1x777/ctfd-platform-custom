name: local-service-recon
category: sandbox
value: 150
type: docker
connection_mode: ssh
ssh_user: ctf
ssh_password: ctf2026
container_port: 22
description: |
  Tu accèdes à un serveur interne. Un agent de monitoring tourne en arrière-plan
  et collecte des métriques sensibles — mais il n'écoute que sur localhost.
  À toi de trouver comment l'interroger.
access_instructions: |
  Connect via SSH then investigate the running services to retrieve the flag.
hint1: |
  Énumère les processus en cours d'exécution et les ports en écoute sur la machine (ps aux, ss -tlnp).
hint2: |
  L'agent de monitoring est un script Python lisible dans /opt/ctf/. Inspecte son code pour découvrir ses endpoints.
hint3: |
  Les agents de monitoring exposent souvent un endpoint /metrics. Interroge le service depuis la machine avec curl.
flag: CTF{metrics_endpoint_exposed_locally}
port: 5003
