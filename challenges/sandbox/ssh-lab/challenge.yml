name: SSH Lab
category: sandbox
value: 100
type: docker
container_port: 22
connection_mode: ssh
ssh_user: ctf
access_instructions: |
  Connect over SSH using the command shown in CTFd.
  The container exposes an SSH service on the host port defined in docker-compose.yml.
description: |
  A small SSH-based challenge used to demonstrate non-web access rendering.
  Players must connect over SSH and inspect the environment to retrieve the flag.
hint1: |
  Connecte-toi via SSH avec les credentials fournis. Une fois connecté, explore le répertoire courant et les répertoires classiques.
hint2: |
  Cherche les fichiers cachés (ls -la) dans le home directory et inspecte /opt, /var/local. Le flag peut être dans un fichier texte.
flag: CTF{ssh_lab_template_flag}
port: 5003
