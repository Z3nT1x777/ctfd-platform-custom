name: zip-hidden
category: forensics
value: 250
type: static
connection_info: ""
description: |
  Un fichier ZIP suspect a été récupéré sur la machine d'un employé.
  Il semble ne contenir que des documents anodins... mais le format ZIP
  permet de cacher des données dans des endroits inattendus.
  Trouve ce qui est dissimulé.

  [evidence.zip](http://192.168.56.10/files/forensics/06-zip-hidden/evidence.zip)
hint1: |
  Le format ZIP comporte plusieurs zones de métadonnées : commentaires, champs extra, etc.
hint2: |
  Essaie : unzip -v secret.zip ou zipinfo -v secret.zip pour voir les métadonnées complètes.
hint3: |
  Le format ZIP supporte des commentaires attachés à l'archive entière, invisibles avec un unzip standard. Des outils comme Python's zipfile, un éditeur hex, ou binwalk peuvent révéler ces données cachées.
flag: CTF{zip_comment_forensics}
