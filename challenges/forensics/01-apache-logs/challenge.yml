name: apache-logs
category: forensics
value: 75
type: static
connection_info: ""
description: |
  Un serveur web interne a été compromis. L'équipe sécurité t'a transmis les logs Apache
  de la nuit de l'incident. Une donnée sensible a été exfiltrée via une requête HTTP.
  Retrouve-la.

  [access.log](http://192.168.56.10/files/forensics/01-apache-logs/access.log)
hint1: |
  Cherche une requête inhabituelle parmi les centaines de requêtes normales.
hint2: |
  Certains attaquants encodent les données exfiltrées en base64 dans les paramètres d'URL.
flag: CTF{apache_log_never_lies}
