name: pcap-dns
category: forensics
value: 200
type: static
connection_info: ""
description: |
  Un malware a exfiltré des données sensibles en utilisant le protocole DNS comme canal caché.
  La capture réseau montre un comportement DNS anormal.
  Reconstitue le message exfiltré.

  [dns_traffic.pcap](http://192.168.56.10/files/forensics/04-pcap-dns/dns_traffic.pcap)
hint1: |
  Ouvre le fichier dans Wireshark et filtre : dns
hint2: |
  Les données ont été encodées et découpées dans les noms de domaines des requêtes DNS. Observe les sous-domaines vers *.exfil.ctf.local
hint3: |
  Extrais les sous-domaines dans l'ordre chronologique, concatène-les. Le résultat est encodé — essaie les encodages classiques (base64, base32, hex) jusqu'à obtenir du texte lisible.
flag: CTF{dns_tunnel_data_exfil}
