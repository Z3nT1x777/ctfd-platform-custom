name: stego-lsb
category: forensics
value: 150
type: static
connection_info: ""
description: |
  Un agent a transmis un message dissimulé dans une photo anodine de paysage.
  L'image semble normale... mais contient-elle vraiment seulement des pixels ?
  Retrouve le message caché.

  [landscape.png](http://192.168.56.10/files/forensics/03-stego-lsb/landscape.png)
hint1: |
  La stéganographie LSB (Least Significant Bit) cache des données dans les bits de poids faible des pixels.
hint2: |
  Essaie l'outil StegSolve ou zsteg (Linux). Ou écris un script Python avec Pillow.
hint3: |
  Le message est encodé dans les LSB d'un canal de couleur spécifique, pixel par pixel. Décode les bits en séquence et regroupe-les par 8 pour obtenir les caractères ASCII — zsteg ou un script Pillow peuvent automatiser ça.
flag: CTF{lsb_pixels_dont_lie}
