name: strings-dump
category: forensics
value: 250
type: static
connection_info: ""
description: |
  Le SOC a réalisé une extraction des chaînes imprimables d'un processus suspect en mémoire.
  Parmi des milliers de chaînes, une seule contient le flag.
  Méthode : grep, ou sois patient...

  [memdump.strings](http://192.168.56.10/files/forensics/05-strings-dump/memdump.strings)
hint1: |
  La commande Unix 'strings' extrait toutes les chaînes imprimables d'un binaire ou d'un dump.
hint2: |
  Le flag suit le format CTF{...}. Utilise un outil de recherche de chaînes pour filtrer par ce pattern — les accolades `{` et `}` sont des marqueurs fiables.
hint3: |
  Si grep ne trouve rien directement, essaie strings -n 4 ou cherche des motifs inhabituels. Le flag est peut-être encodé une fois.
flag: CTF{strings_memdump_analysis}
