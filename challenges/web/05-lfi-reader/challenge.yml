name: lfi-reader
category: web
value: 250
type: docker
connection_mode: web
container_port: 5000
description: |
  Un système de documentation en ligne permet de consulter des fichiers de configuration.
  Le paramètre 'file' charge un fichier depuis le serveur.
  Peut-on vraiment charger n'importe quel fichier ?
hint1: |
  Le paramètre ?file= dans l'URL charge un fichier depuis le serveur.
hint2: |
  Essaie de remonter dans l'arborescence avec des séquences : ../../../../etc/passwd
hint3: |
  Une fois le path traversal confirmé (/etc/passwd fonctionne ?), cherche les fichiers sensibles à la racine du système de fichiers du container. Les flags sont souvent placés dans des fichiers texte à des emplacements standard.
flag: CTF{lfi_path_traversal_to_root}
port: 5034
