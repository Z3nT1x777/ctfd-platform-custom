name: crackme-layers
category: reverse
value: 250
type: static
description: |
  Ce crackme Python applique trois transformations successives sur la clé entrée.
  Analyse chaque couche et remonte jusqu'au flag original.

  **Fichier à analyser :**
  ```python
  import base64

  def layer1(s):
      return base64.b64encode(s.encode()).decode()

  def layer2(s):
      return ''.join(chr(ord(c) ^ 0x0F) for c in s)

  def layer3(s):
      return s[::-1]

  # Expected result after layer3(layer2(layer1(input)))
  TARGET = "6]XU|YXUx6>lvYXjgw=WcYbl`]<jH]>^"

  key = input("Key: ")
  if layer3(layer2(layer1(key))) == TARGET:
      print("Bravo! Flag:", key)
  else:
      print("Nope.")
  ```
hint1: |
  Applique les transformations dans l'ordre inverse : layer3 est un reverse(),
  layer2 est un XOR (sa propre inverse), layer1 est un base64 decode.
hint2: |
  Inverse les couches dans l'ordre : layer3⁻¹ = reverse de TARGET, layer2⁻¹ = XOR octet par octet avec 0x0F (XOR est son propre inverse), layer1⁻¹ = base64.b64decode(). Applique ces 3 étapes en Python pour retrouver l'entrée originale.
hint3: |
  Le flag commence par CTF{ et se termine par }. La bonne réponse est le flag lui-même.
flag: CTF{three_layers_peeled}
