name: rsa-baby
category: crypto
value: 250
type: static
description: |
  Un système RSA a été intercepté. Les paramètres publics sont faibles. Retrouve le message original.

  **Paramètres publics :**
  ```
  n = 3233
  e = 17
  c = 2557
  ```

  Retrouve le message original m (un nombre entier). Le flag est `CTF{` + le texte ASCII du message + `}`.
hint1: |
  RSA : pour déchiffrer, tu as besoin de la clé privée d = e⁻¹ mod φ(n)
hint2: |
  n = 3233 est petit. Essaie de le factoriser : quels sont ses facteurs premiers ?
hint3: |
  Une fois n factorisé en p et q, calcule φ(n) = (p-1)×(q-1), puis trouve d tel que e×d ≡ 1 mod φ(n) (algorithme d'Euclide étendu). Enfin : m = c^d mod n. En Python : pow(c, d, n).
flag: CTF{rsa_small_n_factored}
