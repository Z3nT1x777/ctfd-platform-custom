name: base64-chain
category: crypto
value: 100
type: static
description: |
  Un développeur convaincu que base64 = chiffrement a protégé son flag. Il a même doublé la mise. Retrouve le flag original.

  **Données encodées :**
  ```
  UTFSR2UySmhjMlUyTkY5cGMxOXViM1JmWlc1amNubHdkR2x2Ym4wPQ==
  ```
hint1: |
  Base64 n'est PAS du chiffrement, c'est de l'encodage
hint2: |
  Le message a été encodé deux fois avec le même algorithme
hint3: |
  Applique le décodage base64 une première fois — le résultat ressemble encore à du base64. Recommence.
flag: CTF{base64_is_not_encryption}
