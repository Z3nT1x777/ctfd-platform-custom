name: vigenere-mystery
category: crypto
value: 150
type: static
description: |
  Un espion a chiffré son message avec un chiffrement polyalphabétique. La longueur de la clé est connue : 3 caractères. Retrouve le flag.

  **Texte chiffré :**
  ```
  MXD{fmeorcbi_nypwkpnrezoxgm_ggzlcb}
  ```

  *Longueur de la clé : 3 caractères*
hint1: |
  Le chiffrement de Vigenère utilise un mot-clé pour appliquer plusieurs décalages César
hint2: |
  La clé est en majuscules et fait 3 caractères. Essaie des mots simples.
hint3: |
  Le texte chiffré commence par 'MXD{' et tu sais que le flag commence par 'CTF{'. Calcule chaque lettre de la clé : key[i] = (ord(cipher[i]) - ord(plain[i])) % 26 + ord('A'). Une fois la clé trouvée, utilise CyberChef → Vigenère Decode.
flag: CTF{vigenere_polyalphabetic_cipher}
