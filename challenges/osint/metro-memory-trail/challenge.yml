name: metro-memory-trail
category: osint
value: 150
type: static
description: |
  Un informateur sous couverture a uploadé deux photos avant de disparaître.
  Ces images semblent anodines — mais elles contiennent les coordonnées d'un lieu de rendez-vous et une date codée dans leurs métadonnées.

  <b>Mission :</b> exploite les deux fichiers pour reconstituer le lieu et l'année du rendez-vous.

  <b>Accès :</b>
  <a href="http://192.168.56.10/osint/metro-memory-trail/resources/" target="_blank">
    http://192.168.56.10/osint/metro-memory-trail/resources/
  </a>

  Format du flag : <code>CTF{ville_lieu_AAAA}</code>

connection_info: http://192.168.56.10/osint/metro-memory-trail/resources/

hint1: |
  Accède à la page du challenge et examine les deux images. Pour la première (clue.jpg), identifie visuellement le monument ou le lieu représenté — son nom officiel compte.

hint2: |
  Les fichiers JPEG embarquent des métadonnées EXIF. Utilise un outil comme exiftool, exifmeta.com ou metadata2go.com pour inspecter chaque image. L'une contient des coordonnées GPS, l'autre une date.

hint3: |
  Les coordonnées GPS pointent vers un lieu à Paris. Colle-les dans Google Maps pour trouver le nom exact. La date EXIF de la seconde image donne l'année. Le flag suit le format CTF{ville_lieu_AAAA}.

flag: CTF{paris_bastille_1989}
